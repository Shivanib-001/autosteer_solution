<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implement</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1f1f1f;
  color: white;
}

.topbar {
  padding: 15px;
  background: #111;
  display: flex;
  align-items: center;
  gap: 10px;
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
  gap: 18px;
  justify-content: center;
}

.card {
  width: 165px;
  height: 266px;
  background: #2a2a2a;
  border-radius: 10px;
  padding: 10px;
  border: 1px solid #444;
  text-align: center;

  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

  .card:hover {
    border: 2px solid #00e5ff;
    transform: translateY(-10px);
  }

.card img {
  width: 147px;
  height: 98px;
  object-fit: contain;  
  background: #fff;
  border-radius: 5px;

  display: block;
  margin: 0 auto;     
}

.btn {
  margin-top: 10px;
  padding: 8px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
}

.select {
  background: #00CFDD;
  color: black;
}

.delete {
  background: transparent;
  border: 1px solid #00cfd1;
  color: white;
}

.add-card {
  border: 2px dashed #555;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

h3, p {
  margin: 0;
  padding: 0;
}


.modal {
  display: none;
  position: fixed;
  z-index: 999;

  left: 0;
  top: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.7);

  justify-content: center;
  align-items: center;

  padding: 15px;
  box-sizing: border-box;
}

.modal-content {
  width: 100%;
  max-width: 420px;

  max-height: 90vh;
  overflow-y: auto;

  background: #2a2a2a;
  border-radius: 14px;
  padding: 20px;

  position: relative;

  border: 1px solid #555;

  box-sizing: border-box;
}



.modal-content::-webkit-scrollbar {
  width: 5px;
}

.modal-content::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 10px;
}



.close {
  position: absolute;
  right: 15px;
  top: 10px;

  font-size: 28px;
  cursor: pointer;
}


.detail-row {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;

  word-break: break-word;
}

.modal-title {
  margin-bottom: 20px;
  font-size: 22px;
}



.tractor-modal-image {
  width: 100%;
  max-width: 250px;
  height: auto;

  max-height: 220px;

  object-fit: contain;
  background: white;

  border-radius: 10px;
  padding: 10px;

  box-sizing: border-box;
}

    .gnss-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  font-size: 14px;
  font-weight: bold;
}

.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  transition: 0.3s;
}

.status-dot.green {
  background: #00ff66;
  box-shadow: 0 0 10px #00ff66;
}

.status-dot.red {
  background: red;
  box-shadow: 0 0 10px red;
}

.icon{
  height: 30px;
}

.status-container{
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 15px;
}




@media (max-width: 480px) {

  .modal-content {
    padding: 15px;
    border-radius: 10px;
  }

  .modal-title {
    font-size: 18px;
  }

  .detail-row {
    font-size: 14px;
    padding: 10px;
  }

  .close {
    font-size: 24px;
  }

  .tractor-modal-image {
    max-width: 100%;
    max-height: 180px;
  }
}


.modal-content {
  width: 100%;
  max-width: 700px;
  background: #ffffff;
  border-radius: 12px;
  padding: 18px;
  position: relative;
  box-sizing: border-box;
  color: #222;
}

/* REMOVE OLD TITLE */
.modal-title {
  display: none;
}

.close {
  display: none;
}

/* MAIN */
.implement-detail-container {
  width: 100%;
}

/* HEADER */
.implement-detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.implement-title-section {
  display: flex;
  align-items: center;
  gap: 10px;
}

.implement-title-section h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
}

.tractor-icon {
  height: "20px";
}

.edit-btn {
  background: transparent;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

.implement-line {
  margin: 14px 0 20px;
  border: none;
  border-top: 1px solid #999;
}

/* BODY */
.implement-detail-body {
  display: flex;
  gap: 30px;
  align-items: flex-start;
}

/* IMAGE */
.implement-image-box {
  width: 220px;
  min-width: 220px;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
}

.implement-detail-image {
  width: 100%;
  height: auto;
  object-fit: contain;
}

/* INFO */
.implement-info {
  flex: 1;
}

.info-row {
  display: flex;
  margin-bottom: 18px;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.label {
  font-size: 16px;
  color: #444;
  min-width: 140px;
}

.value {
  font-size: 18px;
  font-weight: bold;
  color: #222;
}

/* BUTTON */
.ok-btn-wrapper {
  text-align: center;
  margin-top: 25px;
}

.ok-btn {
  background: #00c7d9;
  color: white;
  border: none;
  padding: 10px 45px;
  border-radius: 4px;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 3px 0 #008b99;
}

.close-btn {
  background: #00c7d9;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 0 3px 0 #008b99;
}

.implement-detail-logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
}

#goBackButton {
  all: unset;
}


/* MOBILE */
@media (max-width: 700px) {

  .implement-detail-body {
    flex-direction: column;
    align-items: center;
  }

  .implement-image-box {
    width: 100%;
    max-width: 250px;
    min-width: auto;
  }

  .implement-info {
    width: 100%;
  }

  .info-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }

  .label {
    min-width: auto;
  }

  .value {
    font-size: 16px;
  }

  .ok-btn {
    width: 100%;
    font-size: 22px;
  }
}


/* Delete Popup */

#deleteModal {
  display: none;
  position: fixed;
  z-index: 2000;

  left: 0;
  top: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.7);

  justify-content: center;
  align-items: center;
}

.delete-modal-box {
  width: 90%;
  max-width: 420px;

  background: white;
  color: #222;

  border-radius: 12px;

  padding: 30px 25px;

  text-align: center;

  animation: popup 0.25s ease;
}

@keyframes popup {
  from {
    transform: scale(0.8);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }
}

.delete-img {
  width: 120px;
  margin-bottom: 15px;
}

#deleteTitle {
  font-size: 24px;
  margin-bottom: 12px;
  line-height: 1.4;
}

.delete-subtext {
  color: #666;
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 25px;
}

.delete-actions {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.delete-confirm-btn,
.delete-cancel-btn {
  min-width: 120px;
  padding: 12px 20px;

  border-radius: 6px;

  font-size: 16px;
  cursor: pointer;

  transition: 0.3s;
}

.delete-confirm-btn {
  border: none;
  background: #00CFDD;
  color: white;
}

.delete-confirm-btn:hover {
  background: #00b7c4;
}

.delete-cancel-btn {
  background: white;
  border: 1px solid #00CFDD;
  color: #222;
}

.delete-cancel-btn:hover {
  background: #f5f5f5;
}

</style>
</head>

<body>

<div class="topbar">
  <button id="goBackButton" style="padding-bottom: 3px;" onclick="goBack()">❮</button>
  <span style="font-weight: bold; font-size: 22px;">Implement</span>
  <div class="status-container">

    <div class="gnss-status">
      <div id="gnssDot" class="status-dot red"></div>
      <img src="./image/gps.png" alt="GNSS Status" class="icon">
    </div>

    <div class="gnss-status">
      <div id="operationDot" class="status-dot red"></div>
      <img src="./image/operational-system.png" alt="Operation Status" class="icon">
    </div>

  </div>
</div>


<div class="container">
  <h2>Your saved Implements</h2>

  <div class="grid" id="implementGrid"></div>
</div>

<div id="implementModal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="closeModal()">&times;</span>

    <h2 class="modal-title">implement Details</h2>

    <div id="implementDetails"></div>

  </div>

</div>

<!-- Delete Modal -->
<div class="modal" id="deleteModal">

  <div class="delete-modal-box">

    <img src="./image/Delete.svg" class="delete-img" alt="delete">

    <h2 id="deleteTitle">
      Are you sure do you want to delete this Implement?
    </h2>

    <p class="delete-subtext">
      Once you delete this, it will be permanently removed
      from your device
    </p>

    <div class="delete-actions">

      <button class="delete-confirm-btn" id="confirmDeleteBtn">
        Delete
      </button>

      <button class="delete-cancel-btn" onclick="closeDeleteModal()">
        Cancel
      </button>

    </div>

  </div>

</div>

<script>
const grid = document.getElementById("implementGrid");

let implementsData = [];


fetch('./data/implement.json')
  .then(res => res.json())
  .then(data => {

    implementsData = data;

    renderImplements(data);

  })
  .catch(err => {
    console.error("Error loading implements:", err);
  });

function renderImplements(data) {
  grid.innerHTML = "";

  const addCard = document.createElement("div");
  addCard.className = "card add-card";
  addCard.innerHTML = `
    <h1>+</h1>
    <p>Add New Implement</p>
  `;
  addCard.onclick = () => {
    window.location.href = "/add-implement";
  };
  grid.appendChild(addCard);

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img 
        src="${
          item.implement_image || 
          `./image/${item.implement_type}.webp`
        }" 
        alt="${item.implement_name}"
      >
      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <h3>${item.implement_name}</h3>
        <p style="font-size: 16px">(${item.implement_type})</p>
      </div>

    
        <button class="btn delete" onclick="deleteImplement(${item.id})">
        Delete
      </button>
      

      <button class="btn select" onclick="selectImplement(${item.id})">
        View Details
      </button>
    `;

    grid.appendChild(card);
  });
}


function selectImplement(id) {
  console.log("in1")

  const implement = implementsData.find(item => item.id === id);

  if (!implement) return;


  document.getElementById("implementDetails").innerHTML = `

    <div class="implement-detail-container">

      <!-- HEADER -->
      <div class="implement-detail-header">

        <div class="implement-title-section">
        
           <img 
            src='./image/imp.png'}"
            alt="LOGO"
            class="implement-detail-logo"
          >
          <h2>${implement.implement_name || "implement_name"}</h2>
        </div>

       <button class="close-btn" onclick="closeModal()">X</button>

      </div>

      <hr class="implement-line">

      <!-- CONTENT -->
      <div class="implement-detail-body">

        <!-- IMAGE -->
        <div class="implement-image-box">
          <img 
        src="${
          implement.implement_image || 
          `./image/${implement.implement_type}.webp`
        }" 
        alt="${implement.implement_name}"
         class="implement-detail-image"
      >

        </div>

        <!-- DETAILS -->
        <div class="implement-info">

          <div class="info-row">
            <span class="label">Implement Name:</span>
            <span class="value">${implement.implement_name || "N/A"}</span>
          </div>

          <div class="info-row">
            <span class="label">Implement Type:</span>
            <span class="value">${implement.implement_type || "N/A"}</span>
          </div>

          <div class="info-row">
            <span class="label">Width:</span>
            <span class="value">${implement.implement_width || "N/A"}</span>
          </div>

          <div class="info-row">
            <span class="label">Other Data:</span>
            <span class="value">${implement.implement_other || "N/A"}</span>
          </div>

        </div>

      </div>

    </div>
  `;


  document.getElementById("implementModal").style.display = "flex";

}





function closeModal() {

  document.getElementById("implementModal").style.display = "none";

}




window.onclick = function(event) {

  const modal = document.getElementById("implementModal");

  if (event.target === modal) {
    modal.style.display = "none";
  }

}




function goBack() {

  window.location.href = "/dashboard";

}



let deleteimplementId = null;

function deleteImplement(id) {

  deleteimplementId = id;

  document.getElementById("deleteModal").style.display = "flex";

}

function closeDeleteModal() {

  document.getElementById("deleteModal").style.display = "none";

  deleteimplementId = null;

}


document.getElementById("confirmDeleteBtn").addEventListener("click", () => {

  if (!deleteimplementId) return;

  fetch(`/api/implement/${deleteimplementId}`, {
    method: "DELETE"
  })
  .then(res => res.json())
  .then(data => {

    closeDeleteModal();
    location.reload();
    // farmsData = farmsData.filter(item => item.id !== deleteimplementId);

    // renderfarms(farmsData);

  })
  .catch(err => {
    console.error(err);
    closeDeleteModal();
  });

});

let isRunning = false;
let isOPerationRunning = false;
let gnssStatus = false

function updateGNSSStatus(status) {
  const dot = document.getElementById("gnssDot");
  const text = document.getElementById("gnssText");

  if (status) {
    dot.classList.remove("red");
    dot.classList.add("green");
  } else {
    dot.classList.remove("green");
    dot.classList.add("red");
  }
}

function updateOperationStatus(status) {
  const dot = document.getElementById("operationDot");

  if (status) {
    dot.classList.remove("red");
    dot.classList.add("green");
  } else {
    dot.classList.remove("green");
    dot.classList.add("red");
  }
}

fetch('/api/check-status')
.then(res => res.json())
.then(data => {
  if (data.operationStatus === true) {
    isOPerationRunning = true;
    updateOperationStatus(true);
  } else {
    updateOperationStatus(false);
  }
  if (data.cProcessStatus){
    gnssStatus = true
    updateGNSSStatus(true);
  }
  if(data.cProcessStatus===false){
    console.log(gnssStatus)
    gnssStatus=false;
    updateGNSSStatus(false);
    isRunning = false;

  }
})
.catch(err => console.error(err));

  updateGNSSStatus(false);
updateOperationStatus(false);
</script>

</body>
</html>
