<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1f1f1f;
  color: white;
}

.topbar {
  padding: 12px;
  background: #111;
  display: flex;
  gap: 10px;
}

.container {
  display: flex;
  height: calc(90vh - 60px);
  gap: 10px;
  padding: 10px;
}

.map-container {
  display: flex;
  flex-direction: column;
  height: 92vh;
  width: 89%;
}

.map-box {
  flex: 3;
  border-radius: 10px;
  overflow: hidden;
}

#map {
  width: 100%;
  height: 100%;
}
.panel {
  width: 250px;
}


.card {
  background: radial-gradient(circle at top, #2a2a2a, #1a1a1a);

  border-radius: 15px;
  margin-bottom: 30px;
  text-align: center;
}

.label {
  margin-top: -30px;
  font-size: 14px;
}

.value {
  font-size: 18px;
}


.footer {
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 10px;
}

.btn {
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
}

.start, .start-operation { background: #00cfd1; color: black; }
.stop, .save, .cancel, .stop-operation {
  background: transparent;
  border: 1px solid #00cfd1;
  color: white;
}


    .gauge {
      position: relative;
      width: 250px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .speedometer {
      height: 200px;
    }

    .speedometer-ring {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2a2a, #0d1515);
      box-shadow: 
        0 0 30px rgba(0, 200, 200, 0.15),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .speedometer-inner {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2525, #0a1212);
      box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    .speedometer-center {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(180deg, #2a3a3a, #1a2525);
      box-shadow: 
        0 0 15px rgba(0, 200, 200, 0.2),
        inset 0 2px 10px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .needle-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00d4d4;
      box-shadow: 0 0 10px rgba(0, 212, 212, 0.8);
      transition: box-shadow 0.3s ease;
    }

    .needle-dot.active {
      box-shadow: 0 0 20px rgba(0, 212, 212, 1);
    }

    .speedometer-ticks {
      position: absolute;
      width: 260px;
      height: 260px;
    }

    .needle {
      position: absolute;
      width: 70px;
      height: 3px;
      background: linear-gradient(90deg, white, rgba(255,255,255,0.3));

      transform: rotate(-30deg) translateX(-35px);
      border-radius: 2px;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.5));
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .speed-display {
      position: absolute;
      bottom: 30px;
      text-align: center;
      color: white;
    }

    .speed-value {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }

    .speed-value.highlight {
      color: #00d4d4;
    }

    .speed-label {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

  
    .compass {
      position: relative;
    }

    .compass-ring {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2a2a, #0d1515);
      box-shadow: 
        0 0 30px rgba(0, 200, 200, 0.15),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .compass-inner {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2525, #0a1212);
      box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    .compass-ticks-container {
      position: absolute;
      width: 260px;
      height: 260px;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .compass-center {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(180deg, #2a3a3a, #1a2525);
      box-shadow: 
        0 0 15px rgba(0, 200, 200, 0.2),
        inset 0 2px 10px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .compass-degree {
      font-size: 28px;
      font-weight: 600;
      color: #00d4d4;
      transition: transform 0.2s ease;
    }

    .compass-degree.pulse {
      transform: scale(1.1);
    }

    .compass-direction {
      font-size: 12px;
      color: #888;
      margin-top: -2px;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .compass-indicator {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #00d4d4;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 212, 212, 0.8);
      bottom: 170px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      transition: box-shadow 0.3s ease;
    }

    .compass-indicator.active {
      box-shadow: 0 0 20px rgba(0, 212, 212, 1), 0 0 30px rgba(0, 212, 212, 0.5);
    }

    .cardinal {
      position: absolute;
      font-size: 18px;
      font-weight: 500;
      color: #888;
      transition: color 0.3s ease, transform 0.3s ease;
      z-index: 15;
    }

    .cardinal.active {
      color: #00d4d4;
      transform: scale(1.2);
    }

    .cardinal.n { top: -30px; left: 50%; transform: translateX(-50%); }
    .cardinal.n.active { transform: translateX(-50%) scale(1.2); }
    .cardinal.s { bottom: -30px; left: 50%; transform: translateX(-50%); }
    .cardinal.s.active { transform: translateX(-50%) scale(1.2); }
    .cardinal.e { right: -25px; top: 50%; transform: translateY(-50%); }
    .cardinal.e.active { transform: translateY(-50%) scale(1.2); }
    .cardinal.w { left: -25px; top: 50%; transform: translateY(-50%); }
    .cardinal.w.active { transform: translateY(-50%) scale(1.2); }

    .compass-ticks {
      position: absolute;
      width: 260px;
      height: 260px;
    }

    .tick-label {
      fill: #666;
      font-size: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .tick {
      stroke: #3a4a4a;
      stroke-width: 2;
    }

    .tick-major {
      stroke: #4a5a5a;
      stroke-width: 2;
    }
    .btn-start {
      background: #00cfd1;
      color: white;
      padding: 5px;
      border-radius: 5px;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #goBackButton {
      all: unset;
    }

    .gnss-status {
  margin-left: auto;
  display: flex;

.status-dot {
  width: 12px;

.status-dot.green {

.status-dot.red {

.icon{

.custom-alert {

  position: fixed;
  z-index: 5000;

  left: 0;
  top: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.7);

  justify-content: center;
  align-items: center;
}

.alert-box {
  width: 90%;
  max-width: 380px;

  background: white;
  color: #222;

  border-radius: 14px;

  padding: 30px 25px;

  text-align: center;

  animation: popupAnim 0.25s ease;
}

@keyframes popupAnim {

  from {
    transform: scale(0.8);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }

}


.alert-icon {
  width: 70px;
  height: 70px;

  margin: 0 auto 20px;

  border-radius: 50%;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 34px;
  font-weight: bold;

  background: #00cfd1;
  color: white;

#alertTitle {

}

#alertMessage {
  color: #666;
  line-height: 1.5;
  margin-bottom: 25px;
}

.alert-btn {
  border: none;
  background: #00cfd1;

  color: white;

  padding: 12px 30px;

  border-radius: 6px;

  font-size: 16px;
  cursor: pointer;

  transition: 0.3s;
}

.alert-btn:hover {
   background: #00b5b7;
}
</style>

<script>

function showAlert(title, message) {

  document.getElementById("alertTitle").innerText = title;

  document.getElementById("alertMessage").innerText = message;

  document.getElementById("alertPopup").style.display = "flex";
}

function closeAlert() {
  document.getElementById("alertPopup").style.display = "none";
}

/* Close when clicking outside popup */

document.getElementById("alertPopup").addEventListener("click", function(e) {

  if (e.target.id === "alertPopup") {
    closeAlert();
  }

});
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  console.log("Operation ID:", id);

  fetch(`./data/path.json`)
    .then(res => res.json())
    .then(data => {
      const findItem = data.find(item => String(item.id) === id);

      if (findItem) {
        console.log("Found Path Data:", findItem);
        const cords = findItem.pathPlan.farm_boundary;
        const headland = findItem.pathPlan.headland;
        console.log(findItem)
        const line = findItem?.pathPlan?.path_points
        const marker = findItem?.pathPlan?.path_points[0]
        drawFarmOnMap(cords, headland);
        drawPolyline(line, marker)
      }
    })
    .catch(err => {
      console.error("Error fetching path data:", err);
            showAlert(
  "Failed to load path data.",
  "Please try again."
);
    });

   fetch(`/api/updatePathPlan/${id}`, {

   }) 

let farmLayer = null;
let polyline1 = null;
let headlandLayer = null;

function drawPolyline(line, marker){
  if(polyline1){
    map.removeLayer(polyline1)
  }

    const tractorIcon = L.icon({
    iconUrl: './image/blue.svg',
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });

  let vehicleMarker = L.marker(marker, {
    icon: tractorIcon
  }).addTo(map);

  polyline1 = L.polyline(line, {color:"#00cfd1"}).addTo(map)
}

function drawFarmOnMap(coords, headland) {

  if (farmLayer) {
    map.removeLayer(farmLayer);
  }
  if (headlandLayer) {
    map.removeLayer(headlandLayer);
  }

  farmLayer = L.polygon(coords, {
    color: "lime",
    fillColor: "green",
    fillOpacity: 0.3
  }).addTo(map);


  headlandLayer = L.polygon(headland, {
    color: "yellow",
    fillColor: "orange",
    fillOpacity: 0.3
  }).addTo(map);

  map.fitBounds(farmLayer.getBounds());
}

  let pathCoords = [];

ws.onopen = () => {
  console.log('Connected to server');
};

ws.onmessage = (event) => {
  console.log(event.data);

  const newData = event.data.split(" ");

  const heading = parseFloat(newData[5]);
  const hdop = parseFloat(newData[6]);
  const quality = parseInt(newData[7]);
  const satellite = parseInt(newData[8]);
  const age = parseFloat(newData[9]);
  const ntrip = parseInt(newData[11]);

  if (!lat || !lng) return;

  const newPoint = [lat, lng];

  pathCoords.push(newPoint);

  polyline.setLatLngs(pathCoords);

  setSpeed(speed);

};

    function getDirection(degrees) {
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      const index = Math.round(degrees / 45) % 8;
      return dirs[index];
    }



function setSpeed(speed) {
  currentSpeed = Math.max(0, Math.min(60, speed));


  const rotation = -30 + (currentSpeed / 70) * 280;

  needle.style.transform = `rotate(${rotation}deg) translateX(-35px)`;
  speedValue.textContent = `${currentSpeed.toFixed(2)} Km/h`;

  if (currentSpeed > 40) {
    speedValue.classList.add('highlight');
    needleDot.classList.add('active');
  } else {
    speedValue.classList.remove('highlight');
    needleDot.classList.remove('active');
  }
}

function setHeading(degrees) {
  currentHeading = ((degrees % 360) + 360) % 360;
  compassTicks.style.transform = `rotate(${-currentHeading}deg)`;
  compassDegree.textContent = `${Math.round(currentHeading)}°`;
  compassDirection.textContent = getDirection(currentHeading).toLowerCase();
  compassDegree.classList.add('pulse');
  setTimeout(() => compassDegree.classList.remove('pulse'), 200);;
  compassIndicator.classList.add('active');
  setTimeout(() => compassIndicator.classList.remove('active'), 300);
}
