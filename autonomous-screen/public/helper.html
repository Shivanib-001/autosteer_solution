<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speedometer & Compass Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      background: linear-gradient(145deg, #2d3436, #1e2525);
      padding: 30px 20px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .gauge {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Speedometer Styles */
    .speedometer {
      height: 240px;
    }

    .speedometer-ring {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2a2a, #0d1515);
      box-shadow: 
        0 0 30px rgba(0, 200, 200, 0.15),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .speedometer-inner {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2525, #0a1212);
      box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    .speedometer-center {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(180deg, #2a3a3a, #1a2525);
      box-shadow: 
        0 0 15px rgba(0, 200, 200, 0.2),
        inset 0 2px 10px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .needle-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00d4d4;
      box-shadow: 0 0 10px rgba(0, 212, 212, 0.8);
      transition: box-shadow 0.3s ease;
    }

    .needle-dot.active {
      box-shadow: 0 0 20px rgba(0, 212, 212, 1);
    }

    .speedometer-ticks {
      position: absolute;
      width: 340px;
      height: 340px;
    }

    .needle {
      position: absolute;
      width: 70px;
      height: 3px;
      background: linear-gradient(90deg, white, rgba(255,255,255,0.3));

      transform: rotate(-140deg) translateX(-35px);
      border-radius: 2px;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.5));
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .speed-display {
      position: absolute;
      bottom: 30px;
      text-align: center;
      color: white;
    }

    .speed-value {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }

    .speed-value.highlight {
      color: #00d4d4;
    }

    .speed-label {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

 
    .compass {
      position: relative;
    }

    .compass-ring {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2a2a, #0d1515);
      box-shadow: 
        0 0 30px rgba(0, 200, 200, 0.15),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .compass-inner {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1a2525, #0a1212);
      box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    .compass-ticks-container {
      position: absolute;
      width: 260px;
      height: 260px;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .compass-center {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(180deg, #2a3a3a, #1a2525);
      box-shadow: 
        0 0 15px rgba(0, 200, 200, 0.2),
        inset 0 2px 10px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .compass-degree {
      font-size: 28px;
      font-weight: 600;
      color: #00d4d4;
      transition: transform 0.2s ease;
    }

    .compass-degree.pulse {
      transform: scale(1.1);
    }

    .compass-direction {
      font-size: 12px;
      color: #888;
      margin-top: -2px;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .compass-indicator {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #00d4d4;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 212, 212, 0.8);
      bottom: 216px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      transition: box-shadow 0.3s ease;
    }

    .compass-indicator.active {
      box-shadow: 0 0 20px rgba(0, 212, 212, 1), 0 0 30px rgba(0, 212, 212, 0.5);
    }

    .cardinal {
      position: absolute;
      font-size: 18px;
      font-weight: 500;
      color: #888;
      transition: color 0.3s ease, transform 0.3s ease;
      z-index: 15;
    }

    .cardinal.active {
      color: #00d4d4;
      transform: scale(1.2);
    }

    .cardinal.n { top: -30px; left: 50%; transform: translateX(-50%); }
    .cardinal.n.active { transform: translateX(-50%) scale(1.2); }
    .cardinal.s { bottom: -30px; left: 50%; transform: translateX(-50%); }
    .cardinal.s.active { transform: translateX(-50%) scale(1.2); }
    .cardinal.e { right: -25px; top: 50%; transform: translateY(-50%); }
    .cardinal.e.active { transform: translateY(-50%) scale(1.2); }
    .cardinal.w { left: -25px; top: 50%; transform: translateY(-50%); }
    .cardinal.w.active { transform: translateY(-50%) scale(1.2); }

    .compass-ticks {
      position: absolute;
      width: 260px;
      height: 260px;
    }

    .tick-label {
      fill: #666;
      font-size: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .tick {
      stroke: #3a4a4a;
      stroke-width: 2;
    }

    .tick-major {
      stroke: #4a5a5a;
      stroke-width: 2;
    }

   
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .btn {
      padding: 10px 20px;
      background: linear-gradient(180deg, #2a3a3a, #1a2525);
      border: 1px solid #3a4a4a;
      border-radius: 8px;
      color: #00d4d4;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: linear-gradient(180deg, #3a4a4a, #2a3535);
      box-shadow: 0 0 15px rgba(0, 200, 200, 0.3);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.active {
      background: #00d4d4;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="container">
  
    <div class="gauge speedometer">
      <div class="speedometer-ring"></div>
      <svg class="speedometer-ticks" viewBox="0 0 240 240">
<g transform="translate(120, 120)">
  <text class="tick-label" transform="rotate(150) translate(75, 5)" text-anchor="middle">0</text>
  <text class="tick-label" transform="rotate(190) translate(75, 5)" text-anchor="middle">10</text>
  <text class="tick-label" transform="rotate(230) translate(75, 5)" text-anchor="middle">20</text>
  <text class="tick-label" transform="rotate(270) translate(75, 5)" text-anchor="middle">30</text>
  <text class="tick-label" transform="rotate(310) translate(75, 5)" text-anchor="middle">40</text>
  <text class="tick-label" transform="rotate(350) translate(75, 5)" text-anchor="middle">50</text>
  <text class="tick-label" transform="rotate(390) translate(75, 5)" text-anchor="middle">60</text>
</g>
      </svg>
      <div class="speedometer-inner"></div>
      <div class="needle" id="needle"></div>
      <div class="speedometer-center">
        <div class="needle-dot" id="needleDot"></div>
      </div>
      <div class="speed-display">
        <div class="speed-value" id="speedValue">0.00 Km/h</div>
        <div class="speed-label">Speed</div>
      </div>
    </div>

    <div class="gauge compass">

      <div class="compass-ring"></div>
      <div class="compass-ticks-container" id="compassTicks">
        <svg class="compass-ticks" viewBox="0 0 260 260">
          <g transform="translate(130, 130)">
  
         <text style="fill: red; font-weight: bold;" transform="rotate(0) translate(0, -115)" text-anchor="middle">N</text>
          <text class="tick-label" transform="rotate(0) translate(0, -100)" text-anchor="middle">0°</text>

          <text class="tick-label" transform="rotate(30) translate(0, -100)" text-anchor="middle">30°</text>
          <text class="tick-label" transform="rotate(60) translate(0, -100)" text-anchor="middle">60°</text>

          <text style="fill: red; font-weight: bold;" transform="rotate(90) translate(0, -115)" text-anchor="middle">E</text>
          <text class="tick-label" transform="rotate(90) translate(0, -100)" text-anchor="middle">90°</text>

          <text class="tick-label" transform="rotate(120) translate(0, -100)" text-anchor="middle">120°</text>
          <text class="tick-label" transform="rotate(150) translate(0, -100)" text-anchor="middle">150°</text>
          <text style="fill: red; font-weight: bold;" transform="rotate(180) translate(0, -115)" text-anchor="middle">S</text>
          <text class="tick-label" transform="rotate(180) translate(0, -100)" text-anchor="middle">180°</text>

          <text class="tick-label" transform="rotate(210) translate(0, -100)" text-anchor="middle">210°</text>
          <text class="tick-label" transform="rotate(240) translate(0, -100)" text-anchor="middle">240°</text>

          <text style="fill: red; font-weight: bold;" transform="rotate(270) translate(0, -115)" text-anchor="middle">W</text>
          <text class="tick-label" transform="rotate(270) translate(0, -100)" text-anchor="middle">270°</text>

          <text class="tick-label" transform="rotate(300) translate(0, -100)" text-anchor="middle">300°</text>
          <text class="tick-label" transform="rotate(330) translate(0, -100)" text-anchor="middle">330°</text>
          </g>
        </svg>
      </div>
      <div class="compass-inner"></div>
      <div class="compass-indicator" id="compassIndicator"></div>
      <div class="compass-center">
        <div class="compass-degree" id="compassDegree">0°</div>
        <div class="compass-direction" id="compassDirection">N</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnDemo">Start Demo</button>
      <button class="btn" id="btnRandom">Random</button>
      <button class="btn" id="btnReset">Reset</button>
    </div>
  </div>

  <script>
    const needle = document.getElementById('needle');
    const needleDot = document.getElementById('needleDot');
    const speedValue = document.getElementById('speedValue');
    const compassTicks = document.getElementById('compassTicks');
    const compassDegree = document.getElementById('compassDegree');
    const compassDirection = document.getElementById('compassDirection');
    const compassIndicator = document.getElementById('compassIndicator');
    const cardinals = {
      n: document.getElementById('cardinalN'),
      s: document.getElementById('cardinalS'),
      e: document.getElementById('cardinalE'),
      w: document.getElementById('cardinalW')
    };

    let currentSpeed = 0;
    let currentHeading = 0;
    let demoInterval = null;
    let isDemo = false;

    function getDirection(degrees) {
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      const index = Math.round(degrees / 45) % 8;
      return dirs[index];
    }

    function updateCardinals(degrees) {
      Object.values(cardinals).forEach(c => c.classList.remove('active'));
      if (degrees >= 315 || degrees < 45) cardinals.n.classList.add('active');
      else if (degrees >= 45 && degrees < 135) cardinals.e.classList.add('active');
      else if (degrees >= 135 && degrees < 225) cardinals.s.classList.add('active');
      else if (degrees >= 225 && degrees < 315) cardinals.w.classList.add('active');
    }

function setSpeed(speed) {
  currentSpeed = Math.max(0, Math.min(60, speed));


  const rotation = -30 + (currentSpeed / 70) * 280;

  needle.style.transform = `rotate(${rotation}deg) translateX(-35px)`;
  speedValue.textContent = `${currentSpeed.toFixed(2)} Km/h`;

  if (currentSpeed > 40) {
    speedValue.classList.add('highlight');
    needleDot.classList.add('active');
  } else {
    speedValue.classList.remove('highlight');
    needleDot.classList.remove('active');
  }
}

    function setHeading(degrees) {
      currentHeading = ((degrees % 360) + 360) % 360;
      compassTicks.style.transform = `rotate(${-currentHeading}deg)`;
      compassDegree.textContent = `${Math.round(currentHeading)}°`;
      compassDirection.textContent = getDirection(currentHeading).toLowerCase();
      compassDegree.classList.add('pulse');
      setTimeout(() => compassDegree.classList.remove('pulse'), 200);
      updateCardinals(currentHeading);
      compassIndicator.classList.add('active');
      setTimeout(() => compassIndicator.classList.remove('active'), 300);
    }

    function startDemo() {
      if (isDemo) { stopDemo(); return; }
      isDemo = true;
      document.getElementById('btnDemo').classList.add('active');
      document.getElementById('btnDemo').textContent = 'Stop Demo';
      let time = 0;
      demoInterval = setInterval(() => {
        time += 0.05;
        const speed = 25 + Math.sin(time) * 20 + Math.sin(time * 2.5) * 10;
        setSpeed(speed);
        const heading = (currentHeading + 1.5 + Math.sin(time * 0.5) * 0.5) % 360;
        setHeading(heading);
      }, 50);
    }

    function stopDemo() {
      isDemo = false;
      document.getElementById('btnDemo').classList.remove('active');
      document.getElementById('btnDemo').textContent = 'Start Demo';
      if (demoInterval) { clearInterval(demoInterval); demoInterval = null; }
    }

    function randomValues() {
      stopDemo();
      setSpeed(Math.random() * 70);
      setHeading(Math.random() * 360);
    }

    function reset() {
      stopDemo();
      setSpeed(0);
      setHeading(0);
    }

    document.getElementById('btnDemo').addEventListener('click', startDemo);
    document.getElementById('btnRandom').addEventListener('click', randomValues);
    document.getElementById('btnReset').addEventListener('click', reset);

    setSpeed(0);
    setHeading(0);
  </script>
</body>
</html>
